name: Configure Azure environment

on:
  pull_request:
    types: [labeled]

env:
  IMAGE_REGISTRY_URL: ghcr.io
  AZURE_RESOURCE_GROUP: cd-with-actions-aaf
  AZURE_APP_PLAN: asp-nghs-dev
  AZURE_LOCATION: East US 2
  ###############################################
  ### Replace <username> with GitHub username ###
  ###############################################
  AZURE_WEBAPP_NAME: omoferacho-ttt-app

jobs:
  setup-up-azure-resources:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'spin up environment')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Azure resource group (idempotent)
        run: |
          az group create \
            --location "${{ env.AZURE_LOCATION }}" \
            --name "${{ env.AZURE_RESOURCE_GROUP }}"

      - name: Create webapp resource (reuse existing plan)
        run: |
          az webapp create \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --plan "${{ env.AZURE_APP_PLAN }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --deployment-container-image-name nginx

      - name: Configure webapp to use GHCR
        run: |
          az webapp config container set \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --docker-custom-image-name nginx \
            --docker-registry-server-url https://${{ env.IMAGE_REGISTRY_URL }} \
            --docker-registry-server-user ${{ github.actor }} \
            --docker-registry-server-password ${{ secrets.CR_PAT }}

  destroy-azure-resources:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'destroy environment')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Destroy Azure environment
        run: |
          az webapp delete \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}"
``
